spring.application.name=incidencia-urbana-flutter

# Local secret overrides (gitignored). Auto-cargado si existe. 
spring.config.import=optional:file:./application-local.properties

# Server port (port 8081 to run alongside original backend on 8080)
server.port=8081

# JWT configuration (HS256). Secret must be >= 32 bytes (256 bits).
# Configurar via JWT_SECRET env var o application-local.properties (gitignored).
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}



# PostgreSQL Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# hibernate.dialect se auto-detecta desde la JDBC URL desde Hibernate 6.x.
# Especificarlo explícitamente dispara el warning HHH90000025 (removido a propósito).

# Firebase Storage bucket (cada dev configura el suyo en application-local.properties)
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}

# Resend (correos transaccionales). Configurar RESEND_API_KEY y RESEND_FROM en application-local.properties.
# En produccion, RESEND_FROM debe usar el dominio/subdominio verificado en Resend.
# Si RESEND_API_KEY esta vacio, el enlace generado se imprime en consola (modo dev).
resend.api-key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:onboarding@resend.dev}

# URL base para construir el enlace de verificacion del correo.
# En produccion debe apuntar al dominio publico, no a localhost.
app.base-url=${APP_BASE_URL:http://localhost:8081}

# URL que se envia por correo para abrir la pantalla de restablecer contrasena.
# En mobile puede ser un deep link, por ejemplo: reportaya://reset-password
app.password-reset-url=${APP_PASSWORD_RESET_URL:${app.base-url}/reset-password}

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
